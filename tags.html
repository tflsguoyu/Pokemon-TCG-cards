<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#246b9f" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="PTCG Tags" />
    <title>PTCG 内容标签 / Content Tags</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="apple-touch-icon" href="./assets/icons/apple-touch-icon.png" />
    <link rel="stylesheet" href="./tags.css?v=191" />
  </head>
  <body>
    <header class="tag-topbar">
      <div class="brand">
        <div>
          <p class="eyebrow">Pokemon TCG</p>
          <h1>内容标签 / Content Tags</h1>
        </div>
        <nav class="page-links" aria-label="页面 / Pages">
          <a href="./index.html">图鉴</a>
          <a href="./review.html">审核</a>
        </nav>
      </div>
      <section class="tag-controls" aria-label="标签筛选 / Tag filters">
        <button id="clearTagsBtn" class="clear-tags" type="button">全部</button>
        <div id="tagRail" class="tag-rail" aria-label="标签 / Tags"></div>
        <label class="density-control">
          <span class="tool-label">
            <span>每行 <span id="columnsCount" class="inline-count">7</span></span>
            <span>Columns</span>
          </span>
          <input id="columnsInput" type="range" min="4" max="40" value="7" />
        </label>
      </section>
    </header>

    <main>
      <section class="tag-summary" aria-live="polite">
        <div>
          <p id="selectedTags" class="selected-tags">全部内容插画</p>
          <h2 id="resultTitle">Content Cards</h2>
        </div>
        <p id="resultCount" class="result-count">0</p>
      </section>
      <section id="cardGrid" class="tag-card-grid" aria-label="卡图 / Cards"></section>
    </main>

    <template id="tagButtonTemplate">
      <button class="tag-button" type="button">
        <span class="tag-icon" aria-hidden="true"></span>
        <span class="tag-name"></span>
        <span class="tag-count"></span>
      </button>
    </template>

    <template id="tagCardTemplate">
      <article class="tag-card">
        <button class="tag-card-image" type="button">
          <img alt="" loading="lazy" />
        </button>
        <div class="tag-card-meta">
          <div>
            <p class="tag-card-number"></p>
            <h3></h3>
          </div>
          <p class="tag-card-source"></p>
        </div>
      </article>
    </template>

    <dialog id="imageDialog" class="image-dialog">
      <button id="closeDialogBtn" class="close-dialog" type="button" aria-label="关闭 / Close">×</button>
      <figure>
        <img id="dialogImage" alt="" />
        <figcaption id="dialogCaption"></figcaption>
      </figure>
    </dialog>

    <script src="./local-data.js?v=191"></script>
    <script src="./tags.js?v=191"></script>
  </body>
</html>
